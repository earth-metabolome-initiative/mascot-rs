name: Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Serialise Pages deploys; never cancel an in-flight deploy so the live site is
# never left half-replaced.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install nightly toolchain (wasm)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pages-${{ hashFiles('**/Cargo.toml', '.github/workflows/pages.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pages-
            ${{ runner.os }}-cargo-

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked --version 0.7.6

      - name: Build web app
        run: dx build --platform web --release --package mascot-web

      - name: Write CNAME for the custom domain
        run: echo "mgf.earthmetabolome.org" > target/dx/mascot-web/release/web/public/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/dx/mascot-web/release/web/public

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
