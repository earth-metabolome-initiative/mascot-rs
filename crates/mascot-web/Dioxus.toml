[application]
# Static files copied verbatim to the site root (the social card referenced by
# the Open Graph and Twitter meta tags in index.html lives here as
# /social-card.png).
asset_dir = "public"

[web.app]
# Sets the static <title> in index.html so the tab title is correct before the
# WASM app mounts (avoids a flash of the default "dioxus" title on load).
title = "Spectral similarity graph"
